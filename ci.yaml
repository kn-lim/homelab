apps:
  run:
    - application: webhook
      functionName: homelab-lambda
      s3Key: lambda/webhook/bootstrap.zip

terraform:
  run:
    - application: grafana
      whenModified:
        - terraform/_modules/grafana
        - terraform/_units/grafana
    - application: talos
      whenModified:
        - terraform/_modules/cluster-bootstrap
        - terraform/_modules/onepassword-secret
        - terraform/_modules/talos
        - terraform/_stacks/talos
        - terraform/_units/cluster-bootstrap
        - terraform/_units/onepassword-secret
        - terraform/_units/talos
    - application: webhook
      whenModified:
        - terraform/_modules/aws/lambda-permission
        - terraform/_stacks/webhook
        - terraform/_units/aws/apigateway
        - terraform/_units/aws/lambda
        - terraform/_units/aws/lambda-permission
        - terraform/_units/aws/sqs
        - terraform/_units/onepassword-secret
