# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  argo:
    desc: Runs the ArgoCD CI task
    requires:
      vars: [APPLICATION]
    cmd: 'argocd app sync {{.APPLICATION}} --grpc-web --insecure'

  lambda:
    desc: Builds and deploys a Lambda function
    requires:
      vars: [DIRECTORY, FUNCTION_NAME, S3_KEY]
    dir: "{{.DIRECTORY}}"
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - defer: rm -f bootstrap bootstrap.zip
      - |
        go build -o bootstrap .
        zip bootstrap.zip bootstrap
        aws s3 cp bootstrap.zip s3://$TG_BUCKET/{{.S3_KEY}}
        aws lambda update-function-code --function-name {{.FUNCTION_NAME}} --s3-bucket $TG_BUCKET --s3-key {{.S3_KEY}}

  parse:
    desc: Parses comma-separated folder paths and outputs CI commands as JSON
    requires:
      vars: [PATHS]
    cmd: |
      lookup_ci() {
        field="${3:-application}"
        LOOKUP_PATH="$2" yq e "
          .${1}.run[]
          | select(.whenModified | any_c(
              . as \$p | ((strenv(LOOKUP_PATH) == \$p) or (strenv(LOOKUP_PATH) | test(\"^\" + \$p + \"/\")))
            ))
          | .${field}
        " ci.yaml 2>/dev/null | head -1
      }

      echo "{{.PATHS}}" | tr ',' '\n' | while IFS= read -r path; do
        path=$(echo "$path" | tr -d ' \t')
        [ -z "$path" ] && continue
        case "$path" in
          apps/*/*)
            app_dir="$(echo "$path" | cut -d'/' -f1-2)"
            app_name="$(echo "$path" | cut -d'/' -f2)"
            function_name=$(APP="$app_name" yq e '.apps.run[] | select(.application == strenv(APP)) | .functionName' ci.yaml 2>/dev/null | head -1)
            s3_key=$(APP="$app_name" yq e '.apps.run[] | select(.application == strenv(APP)) | .s3Key' ci.yaml 2>/dev/null | head -1)
            if [ -n "$function_name" ] && [ -n "$s3_key" ]; then
              echo "task ci:lambda DIRECTORY=$app_dir FUNCTION_NAME=$function_name S3_KEY=$s3_key"
            fi
            ;;
          kubernetes/overlays/*/*/*/*)
            echo "task ci:argo APPLICATION=$(echo "$path" | cut -d'/' -f6)"
            ;;
          kubernetes/bases/*)
            override=$(lookup_ci kubernetes "$path")
            base=$(echo "$path" | cut -d'/' -f3)
            echo "task ci:argo APPLICATION=${override:-$base}"
            ;;
          terraform/_*)
            override=$(lookup_ci terraform "$path")
            if [ -n "$override" ]; then
              for dir in terraform/[!_]*/*/*; do
                if [ -d "$dir" ] && [ "${dir##*/}" = "$override" ]; then
                  echo "task ci:terraform DIRECTORY=$dir"
                fi
              done
            fi
            ;;
          terraform/*/*/*)
            echo "task ci:terraform DIRECTORY=$(echo "$path" | cut -d'/' -f1-4)"
            ;;
        esac
      done | awk '!seen[$0]++' | (
        printf '['
        delimiter=''
        while IFS= read -r c; do
          printf '%s{"command":"%s"}' "$delimiter" "$c"
          delimiter=','
        done
        printf ']'
      )

  start:
    desc: Wrapper to start the CI workflow
    requires:
      vars: [PATHS]
    vars:
      BRANCH: '{{.BRANCH | default "main"}}'
      NAMESPACE: '{{.NAMESPACE | default "argo-workflows"}}'
      REPO: '{{.REPO | default "git@github.com:kn-lim/homelab.git"}}'
    cmd: 'argo submit kubernetes/workflows/ci.yaml -n {{.NAMESPACE}} -p repo={{.REPO}} -p branch={{.BRANCH}} -p paths={{.PATHS}}'

  terraform:
    desc: Runs the Terraform CI task
    requires:
      vars: [DIRECTORY]
    dir: "{{.DIRECTORY}}"
    cmd: 'terragrunt stack run apply --non-interactive'
