apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate

metadata:
  name: command
  namespace: argo-workflows

spec:
  templates:
    - name: run
      inputs:
        parameters:
          - name: command
          - name: workdir
            default: /workdir/src
      container:
        image: ghcr.io/jdx/mise
        command: [bash, -c]
        args:
          - |
            mise trust &&
            eval "$(mise activate bash)" &&
            {{inputs.parameters.command}}
        workingDir: "{{inputs.parameters.workdir}}"
        env:
          - name: MISE_CACHE_DIR
            value: /workdir/.cache/mise
          - name: MISE_DATA_DIR
            value: /workdir/.mise
        envFrom:
          - secretRef:
              name: environment-variables
        volumeMounts:
          - name: workdir
            mountPath: /workdir

    - name: parse
      inputs:
        parameters:
          - name: paths
      script:
        image: ghcr.io/jdx/mise
        command: [bash]
        source: |
          mise trust > /dev/null &&
          eval "$(mise activate bash)" &&
          task ci:parse PATHS="{{inputs.parameters.paths}}"
        workingDir: /workdir/src
        env:
          - name: MISE_CACHE_DIR
            value: /workdir/.cache/mise
          - name: MISE_DATA_DIR
            value: /workdir/.mise
        envFrom:
          - secretRef:
              name: environment-variables
        volumeMounts:
          - name: workdir
            mountPath: /workdir
