apiVersion: argoproj.io/v1alpha1
kind: Workflow

metadata:
  generateName: argocd-
  namespace: argo-workflows

spec:
  entrypoint: main
  onExit: status
  ttlStrategy:
    secondsAfterCompletion: 86400
  activeDeadlineSeconds: 3600
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: repo
        value: git@github.com:kn-lim/homelab.git
      - name: revision
        value: main
      - name: application

  volumes:
    - name: ssh-key
      secret:
        secretName: argo-workflows-ssh-key
        defaultMode: 0400

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

  templates:
    - name: main
      dag:
        tasks:
          - name: git-clone
            templateRef:
              name: git
              template: clone
            arguments:
              parameters:
                - name: repo
                  value: "{{workflow.parameters.repo}}"
                - name: revision
                  value: "{{workflow.parameters.revision}}"
          - name: setup
            dependencies: [git-clone]
            templateRef:
              name: setup
              template: setup
          - name: argocd-sync
            dependencies: [setup]
            templateRef:
              name: command
              template: run
            arguments:
              parameters:
                - name: command
                  value: argocd app sync {{workflow.parameters.application}} --grpc-web --insecure

    - name: status
      steps:
        - - name: send-status
            templateRef:
              name: discord
              template: status
