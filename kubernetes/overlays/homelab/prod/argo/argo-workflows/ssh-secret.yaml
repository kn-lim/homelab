apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: argo-workflows-ssh-key
  namespace: argo-workflows

spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: argocd-ssh/private key
